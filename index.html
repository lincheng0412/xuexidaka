<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>学习打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
            padding: 1.5rem 1rem 3rem;
            min-height: 100vh;
            color: #1a2c3e;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 1.8rem;
            padding: 0.5rem 0.5rem;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b6e9e, #4a9fcf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .hero h1::before {
            content: "📚";
            font-size: 2rem;
            background: none;
            color: #2c7cb6;
        }

        .hero p {
            color: #5a6e7c;
            margin-top: 0.4rem;
            font-weight: 500;
        }

        .checkin-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
        }

        .date-badge {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4f7ea0;
            background: #eef3fc;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin-bottom: 1rem;
        }

        .tasks-area {
            margin: 1rem 0 1.2rem;
            background: rgba(245, 250, 255, 0.6);
            border-radius: 1.8rem;
            padding: 0.8rem 1rem;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tasks-title {
            font-weight: 700;
            font-size: 1rem;
            color: #2c5a7a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-count-badge {
            font-size: 0.7rem;
            background: #d4e3f0;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .add-task-btn {
            background: #eef2fa;
            border: none;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            color: #2c7cb6;
            transition: 0.1s;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(80, 100, 120, 0.15);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-check {
            width: 22px;
            height: 22px;
            accent-color: #2c8bc2;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .task-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1f3b4c;
            word-break: break-word;
            flex: 2;
            min-width: 120px;
        }

        .task-input {
            border: 1px solid #cbdbe0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.85rem;
            flex: 2;
            min-width: 140px;
            background: white;
            font-family: inherit;
        }

        .task-input:focus {
            outline: none;
            border-color: #2c8bc2;
            box-shadow: 0 0 0 2px rgba(44,139,194,0.2);
        }

        .delete-task {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #9babb8;
            padding: 0 6px;
            transition: 0.1s;
        }

        .delete-task:hover {
            color: #e26d5c;
        }

        .task-required-tag {
            font-size: 0.65rem;
            background: #ffe0b5;
            padding: 2px 8px;
            border-radius: 20px;
            color: #b45f06;
            white-space: nowrap;
        }

        .task-warning {
            font-size: 0.7rem;
            color: #e07c3c;
            margin-top: 10px;
            text-align: center;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .stat-item {
            flex: 1;
            background: #ffffffcc;
            border-radius: 1.8rem;
            padding: 0.7rem 0.3rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f5e8c;
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5f7f9a;
        }

        .checkin-btn {
            width: 100%;
            background: linear-gradient(105deg, #1f6392, #2c8bc2);
            border: none;
            padding: 0.9rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .checkin-btn:disabled {
            background: #b2c9da;
            cursor: not-allowed;
            opacity: 0.7;
            transform: none;
        }

        .streak-badge {
            background: #ffeed9;
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 1rem;
            font-size: 0.8rem;
        }

        .history-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #2c8bc2;
            padding-left: 0.8rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .weekday {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6a7f92;
        }

        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            background-color: #f8fafd;
            border-radius: 1rem;
            cursor: default;
        }

        .day-cell.checked {
            background: #2c8bc2;
            color: white;
            box-shadow: 0 2px 6px rgba(44,139,194,0.3);
        }

        .day-cell.checked::after {
            content: "✓";
            margin-left: 2px;
            font-weight: bold;
        }

        .day-cell.today-highlight {
            border: 2px solid #f5b042;
            background-color: #fff2e0;
            color: #c46f0f;
            font-weight: 800;
        }

        .day-cell.empty {
            background: transparent;
            color: #cbdae6;
        }

        .log-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid #eef2f7;
            font-size: 0.85rem;
        }

        .log-date {
            font-weight: 500;
        }

        .log-status {
            background: #e0f0fa;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        body.dark {
            background: linear-gradient(145deg, #1e2a32, #18222a);
            color: #eef2f8;
        }

        body.dark .checkin-card,
        body.dark .history-card {
            background: #2a3a44cc;
            backdrop-filter: blur(10px);
            border-color: #3f5562;
        }

        body.dark .tasks-area {
            background: #25363fcc;
        }

        body.dark .task-label {
            color: #e2edf5;
        }

        body.dark .task-input {
            background: #1e2f38;
            border-color: #4b6f80;
            color: white;
        }

        body.dark .stat-item {
            background: #1e2f3a;
        }

        body.dark .stat-number {
            color: #74c0e8;
        }

        body.dark .day-cell {
            background-color: #1f2f38;
            color: #c2d6e2;
        }

        body.dark .day-cell.checked {
            background: #3a9bd5;
        }

        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .theme-btn {
            background: #eef2f8;
            border: none;
            border-radius: 60px;
            padding: 0.3rem 1rem;
            cursor: pointer;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8ba0ae;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="theme-toggle">
        <button class="theme-btn" id="themeSwitcher">🌙 暗夜模式</button>
    </div>
    <div class="hero">
        <h1>学习打卡</h1>
        <p>永久保留你的专属任务 · 每天沿用同一套清单</p>
    </div>

    <div class="checkin-card">
        <div class="date-badge" id="currentDateDisplay"></div>
        
        <div class="tasks-area">
            <div class="tasks-header">
                <div class="tasks-title">
                    <span>📋 今日学习任务清单</span>
                    <span class="task-count-badge" id="taskCountBadge">0/6</span>
                </div>
                <button class="add-task-btn" id="addTaskBtn">+ 添加任务 (最多6项)</button>
            </div>
            <div id="dailyTaskList"></div>
            <div id="taskMessage" class="task-warning"></div>
            <div style="font-size:0.65rem; text-align:right; margin-top:6px; color:#8ba0ae;">✏️ 修改后自动保存为永久模板</div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><div class="stat-number" id="totalDaysCount">0</div><div class="stat-label">累计打卡</div></div>
            <div class="stat-item"><div class="stat-number" id="currentStreakCount">0</div><div class="stat-label">🔥 连续</div></div>
            <div class="stat-item"><div class="stat-number" id="maxStreakCount">0</div><div class="stat-label">🏆 最长</div></div>
        </div>
        
        <button class="checkin-btn" id="checkinBtn">✨ 今日打卡 ✨</button>
        <div class="streak-badge">
            <span>📌 任务清单永久保存</span>
            <span>✏️ 修改后第二天依然是您自定义的内容</span>
        </div>
    </div>

    <div class="history-card">
        <div class="section-title">📅 打卡日历</div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="section-title">📋 最近打卡记录</div>
        <div class="log-list" id="logList"></div>
    </div>
    <footer>💪 自定义任务永久保留，每天沿用您的专属清单</footer>
</div>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_CHECKIN = 'custom_checkin_data_v2';
    const STORAGE_TASK_TEMPLATE = 'custom_task_template_v2';   // 永久任务模板（用户自定义的清单结构）
    const STORAGE_DAILY_COPY = 'custom_daily_tasks_cache_v2';  // 每天拷贝的副本（仅用于当天勾选状态）
    
    const MAX_TASKS = 6;
    
    // 获取今日日期
    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    
    // ---------- 默认初始模板（首次使用时） ----------
    function getDefaultTemplate() {
        return [
            { id: "t1", text: "📖 学习英语单词 (可编辑)", completed: false },
            { id: "t2", text: "💻 编程练习 / 算法题", completed: false },
            { id: "t3", text: "📘 阅读专业书籍 15分钟", completed: false },
            { id: "t4", text: "🔄 复习昨日笔记", completed: false },
            { id: "t5", text: "🎧 英语听力练习", completed: false },
            { id: "t6", text: "✍️ 写学习总结", completed: false }
        ].slice(0, MAX_TASKS);
    }
    
    // 获取用户的任务模板（永久保留的内容结构，不含勾选状态，勾选状态每天独立）
    function getTaskTemplate() {
        const raw = localStorage.getItem(STORAGE_TASK_TEMPLATE);
        if (raw) {
            try {
                const template = JSON.parse(raw);
                if (Array.isArray(template) && template.length > 0) {
                    // 确保每个任务有 text 和 id
                    return template.map(t => ({ id: t.id || Date.now() + Math.random(), text: t.text || "学习任务", completed: false }));
                }
            } catch(e) {}
        }
        // 首次使用，存入默认模板
        const defaultTemplate = getDefaultTemplate();
        localStorage.setItem(STORAGE_TASK_TEMPLATE, JSON.stringify(defaultTemplate));
        return defaultTemplate;
    }
    
    // 保存任务模板（用户增删改任务内容时，同时更新模板）
    function saveTaskTemplate(template) {
        // 保存时不保存 completed 状态，只保留结构和文本
        const toStore = template.map(t => ({ id: t.id, text: t.text }));
        localStorage.setItem(STORAGE_TASK_TEMPLATE, JSON.stringify(toStore));
    }
    
    // 获取今天的任务副本（基于模板复制，同时保留今天的勾选进度）
    function getTodayTasks() {
        const today = getTodayStr();
        const template = getTaskTemplate();  // 获取当前永久模板（文字、顺序）
        
        // 读取今日缓存（包含勾选状态）
        const cacheRaw = localStorage.getItem(STORAGE_DAILY_COPY);
        let cache = {};
        if (cacheRaw) { try { cache = JSON.parse(cacheRaw); } catch(e) {} }
        
        if (cache[today]) {
            // 已有今日缓存，但需要确保任务数量/顺序与模板一致（用户可能在今天修改了模板，需同步）
            const cachedTasks = cache[today];
            // 合并逻辑：以模板的id为准，保留原有勾选状态，新增任务则添加，删除任务则移除
            const merged = [];
            for (let tmpl of template) {
                const existing = cachedTasks.find(c => c.id === tmpl.id);
                if (existing) {
                    merged.push({ ...tmpl, completed: existing.completed || false });
                } else {
                    merged.push({ ...tmpl, completed: false });
                }
            }
            // 如果缓存中有多余的任务（模板已删除的），丢弃
            cache[today] = merged;
            localStorage.setItem(STORAGE_DAILY_COPY, JSON.stringify(cache));
            return merged;
        } else {
            // 新的一天：从模板复制，全部未完成
            const freshTasks = template.map(t => ({ ...t, completed: false }));
            cache[today] = freshTasks;
            localStorage.setItem(STORAGE_DAILY_COPY, JSON.stringify(cache));
            return freshTasks;
        }
    }
    
    // 保存今天的任务（同时更新缓存，如果用户修改了任务文字/增删，也要同步更新模板）
    function saveTodayTasks(tasks, updateTemplate = true) {
        const today = getTodayStr();
        const cacheRaw = localStorage.getItem(STORAGE_DAILY_COPY);
        let cache = {};
        if (cacheRaw) { try { cache = JSON.parse(cacheRaw); } catch(e) {} }
        
        // 保存今天的勾选状态和任务列表（保留完整结构）
        cache[today] = tasks.map(t => ({ ...t }));
        localStorage.setItem(STORAGE_DAILY_COPY, JSON.stringify(cache));
        
        // 如果 updateTemplate 为 true，说明用户修改了任务内容或增删，需要同步更新永久模板（保留文字和顺序，不含勾选）
        if (updateTemplate) {
            const newTemplate = tasks.map(t => ({ id: t.id, text: t.text }));
            localStorage.setItem(STORAGE_TASK_TEMPLATE, JSON.stringify(newTemplate));
        }
    }
    
    // 添加新任务
    function addNewTask() {
        let tasks = getTodayTasks();
        if (tasks.length >= MAX_TASKS) {
            showToastMessage(`最多只能添加 ${MAX_TASKS} 项任务`, 1500);
            return false;
        }
        const newId = Date.now() + Math.random();
        tasks.push({ id: newId, text: "新任务 (点击编辑)", completed: false });
        saveTodayTasks(tasks, true);  // 同步更新模板
        renderTaskList();
        return true;
    }
    
    function deleteTask(taskId) {
        let tasks = getTodayTasks();
        if (tasks.length <= 1) {
            showToastMessage("至少保留一项任务，才能保证学习质量~", 1200);
            return;
        }
        tasks = tasks.filter(t => t.id != taskId);
        saveTodayTasks(tasks, true);  // 删除同步到模板
        renderTaskList();
    }
    
    function updateTaskText(taskId, newText) {
        if (!newText.trim()) newText = "📝 学习任务";
        let tasks = getTodayTasks();
        const task = tasks.find(t => t.id == taskId);
        if (task) task.text = newText.trim();
        saveTodayTasks(tasks, true);  // 文字修改同步到模板
        renderTaskList();
    }
    
    function toggleTaskComplete(taskId, completed) {
        let tasks = getTodayTasks();
        const task = tasks.find(t => t.id == taskId);
        if (task) task.completed = completed;
        saveTodayTasks(tasks, false);  // 仅保存勾选状态，不更新模板（模板不关心勾选）
        refreshCheckinButtonState();
        updateTaskWarningMsg();
        renderTaskList();  // 重新渲染保持界面
    }
    
    // 是否全部完成
    function areAllTasksCompleted() {
        const tasks = getTodayTasks();
        if (tasks.length === 0) return false;
        return tasks.every(t => t.completed === true);
    }
    
    // 打卡数据
    function loadCheckinData() {
        const raw = localStorage.getItem(STORAGE_CHECKIN);
        if (!raw) return { checkins: [] };
        try { return JSON.parse(raw); } catch(e) { return { checkins: [] }; }
    }
    function saveCheckinData(data) { localStorage.setItem(STORAGE_CHECKIN, JSON.stringify(data)); }
    function isTodayChecked() { return loadCheckinData().checkins.includes(getTodayStr()); }
    
    function refreshCheckinButtonState() {
        const btn = document.getElementById('checkinBtn');
        if (!btn) return;
        if (isTodayChecked()) {
            btn.disabled = true;
            btn.innerHTML = '✅ 今日已完成打卡 ✅';
            return;
        }
        const allDone = areAllTasksCompleted();
        if (!allDone) {
            btn.disabled = true;
            btn.innerHTML = '🔒 请勾选全部任务后再打卡 🔒';
        } else {
            btn.disabled = false;
            btn.innerHTML = '✨ 今日打卡 ✨';
        }
    }
    
    function updateTaskWarningMsg() {
        const msgDiv = document.getElementById('taskMessage');
        if (!msgDiv) return;
        if (isTodayChecked()) {
            msgDiv.innerHTML = '🎉 今日已完成打卡，明天继续挑战！';
            return;
        }
        const tasks = getTodayTasks();
        const completedCount = tasks.filter(t => t.completed).length;
        const total = tasks.length;
        if (completedCount === total && total > 0) {
            msgDiv.innerHTML = '✅ 所有任务已完成！可以打卡啦！';
        } else {
            msgDiv.innerHTML = `⚠️ 还需完成 ${total - completedCount} 项任务 (全部勾选后才能打卡)`;
        }
        const badge = document.getElementById('taskCountBadge');
        if (badge) badge.innerText = `${total}/${MAX_TASKS}`;
    }
    
    function renderTaskList() {
        const container = document.getElementById('dailyTaskList');
        if (!container) return;
        const tasks = getTodayTasks();
        const checkedToday = isTodayChecked();
        
        let html = '';
        tasks.forEach(task => {
            const isChecked = task.completed;
            const disabledAttr = checkedToday ? 'disabled' : '';
            html += `
                <div class="task-item" data-task-id="${task.id}">
                    <input type="checkbox" class="task-check" data-id="${task.id}" ${isChecked ? 'checked' : ''} ${disabledAttr}>
                    <div class="task-content">
                        <span class="task-label" style="${checkedToday ? 'opacity:0.6' : ''}">${escapeHtml(task.text)}</span>
                        ${!checkedToday ? `<input type="text" class="task-input" data-id="${task.id}" value="${escapeHtml(task.text)}" placeholder="输入学习内容">` : ''}
                        ${!checkedToday ? `<button class="delete-task" data-id="${task.id}" title="删除任务">🗑️</button>` : ''}
                    </div>
                </div>
            `;
        });
        if (tasks.length === 0 && !checkedToday) {
            html = '<div style="text-align:center; padding:20px;">暂无任务，点击上方添加任务～</div>';
        }
        container.innerHTML = html;
        
        if (!checkedToday) {
            document.querySelectorAll('.task-check').forEach(chk => {
                chk.addEventListener('change', (e) => {
                    const id = e.target.getAttribute('data-id');
                    toggleTaskComplete(id, e.target.checked);
                });
            });
            document.querySelectorAll('.task-input').forEach(input => {
                input.addEventListener('blur', (e) => {
                    const id = e.target.getAttribute('data-id');
                    const newVal = e.target.value;
                    updateTaskText(id, newVal);
                });
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') e.target.blur();
                });
            });
            document.querySelectorAll('.delete-task').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    deleteTask(id);
                });
            });
        }
        updateTaskWarningMsg();
        refreshCheckinButtonState();
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function performCheckin() {
        if (isTodayChecked()) {
            showToastMessage("今天已经打过卡啦，明天继续！");
            return false;
        }
        if (!areAllTasksCompleted()) {
            showToastMessage("请先完成今日所有任务（打√）再打卡！📌");
            return false;
        }
        const data = loadCheckinData();
        const today = getTodayStr();
        data.checkins.push(today);
        data.checkins.sort();
        saveCheckinData(data);
        refreshAllUI();
        showToastMessage("🎉 打卡成功！今日学习任务全部完成！");
        return true;
    }
    
    function calculateStreak(checkins) {
        if (!checkins.length) return { currentStreak: 0, maxStreak: 0 };
        const sorted = [...checkins].sort();
        let streak = 1, maxStreak = 1;
        for (let i=1;i<sorted.length;i++) {
            const prev = new Date(sorted[i-1]), cur = new Date(sorted[i]);
            const diff = (cur - prev) / (86400000);
            if (diff === 1) { streak++; maxStreak = Math.max(maxStreak, streak); }
            else if (diff > 1) streak = 1;
        }
        let currentStreak = 0;
        const today = getTodayStr();
        let checkDate = new Date(today);
        const set = new Set(sorted);
        while (true) {
            const ds = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
            if (set.has(ds)) { currentStreak++; checkDate.setDate(checkDate.getDate()-1); }
            else break;
        }
        return { currentStreak, maxStreak };
    }
    
    function renderCalendar(checkinsSet) {
        const grid = document.getElementById('calendarGrid');
        if (!grid) return;
        const weekdays = ['一','二','三','四','五','六','日'];
        let html = weekdays.map(d => `<div class="weekday">${d}</div>`).join('');
        const today = new Date();
        const y = today.getFullYear(), m = today.getMonth();
        const firstDay = new Date(y,m,1);
        let startWeek = firstDay.getDay();
        let offset = startWeek === 0 ? 6 : startWeek-1;
        const startDate = new Date(y,m,1);
        startDate.setDate(startDate.getDate() - offset);
        for (let i=0;i<42;i++) {
            const cell = new Date(startDate);
            cell.setDate(startDate.getDate() + i);
            const ds = `${cell.getFullYear()}-${String(cell.getMonth()+1).padStart(2,'0')}-${String(cell.getDate()).padStart(2,'0')}`;
            const isChecked = checkinsSet.has(ds);
            const isToday = ds === getTodayStr();
            let cls = 'day-cell';
            if (isChecked) cls += ' checked';
            if (isToday) cls += ' today-highlight';
            if (cell.getMonth() !== m) cls += ' empty';
            html += `<div class="${cls}">${cell.getDate()}</div>`;
        }
        grid.innerHTML = html;
    }
    
    function refreshAllUI() {
        const data = loadCheckinData();
        const checkins = data.checkins || [];
        const set = new Set(checkins);
        document.getElementById('totalDaysCount').innerText = checkins.length;
        const { currentStreak, maxStreak } = calculateStreak(checkins);
        document.getElementById('currentStreakCount').innerText = currentStreak;
        document.getElementById('maxStreakCount').innerText = maxStreak;
        const d = new Date();
        const week = ['周日','周一','周二','周三','周四','周五','周六'];
        document.getElementById('currentDateDisplay').innerHTML = `📌 ${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${week[d.getDay()]}`;
        renderCalendar(set);
        const logs = [...checkins].sort().reverse().slice(0,6);
        const logDiv = document.getElementById('logList');
        if (logs.length === 0) logDiv.innerHTML = '<div class="empty-log" style="text-align:center; color:#99aebb;">暂无打卡记录</div>';
        else {
            logDiv.innerHTML = logs.map(date => `<div class="log-item"><span class="log-date">📖 ${date}</span><span class="log-status">任务完成✓ 已打卡</span></div>`).join('');
        }
        renderTaskList();
    }
    
    let lastDate = getTodayStr();
    setInterval(() => {
        const now = getTodayStr();
        if (now !== lastDate) { lastDate = now; refreshAllUI(); }
    }, 60000);
    
    window.addEventListener('storage', (e) => {
        if (e.key === STORAGE_CHECKIN || e.key === STORAGE_TASK_TEMPLATE || e.key === STORAGE_DAILY_COPY) refreshAllUI();
    });
    
    function showToastMessage(msg, dur=1800) {
        let toast = document.querySelector('.custom-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#1f2e3ad9';
            toast.style.backdropFilter = 'blur(12px)';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '60px';
            toast.style.fontSize = '0.85rem';
            toast.style.zIndex = '999';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toast.style.opacity = '0', dur);
    }
    
    function initTheme() {
        const saved = localStorage.getItem('theme_mode');
        if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeSwitcher').innerHTML = '☀️ 明亮模式'; }
        else { document.body.classList.remove('dark'); document.getElementById('themeSwitcher').innerHTML = '🌙 暗夜模式'; }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme_mode', 'light');
            document.getElementById('themeSwitcher').innerHTML = '🌙 暗夜模式';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme_mode', 'dark');
            document.getElementById('themeSwitcher').innerHTML = '☀️ 明亮模式';
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        initTheme();
        refreshAllUI();
        document.getElementById('checkinBtn')?.addEventListener('click', performCheckin);
        document.getElementById('themeSwitcher')?.addEventListener('click', toggleTheme);
        document.getElementById('addTaskBtn')?.addEventListener('click', () => { addNewTask(); });
    });
</script>
</body>
